<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Nacional EFIL 2025</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="logo">EFIL 2025</div>
            <ul class="nav-links">
                <li><a href="#" data-target="home" class="active">Inicio</a></li>
                <li><a href="#" data-target="standings">Tabla</a></li>
                <li><a href="#" data-target="matches">Partidos</a></li>
                <li><a href="#" data-target="admin">Admin</a></li>
            </ul>
        </div>
    </nav>

    <main class="container main-content">

        <!-- HOME VIEW -->
        <section id="home" class="view active">
            <div class="hero"
                style="display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 40px 20px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; text-align: center; border-radius: 12px;">
                <img src="shield.png" alt="Escudo EFIL"
                    style="width: 150px; height: auto; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); display: block;">
                <h1
                    style="font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin: 0; color: white; display: block;">
                    TORNEO NACIONAL 2025</h1>

                <div class="hero-actions"
                    style="display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
                    <button class="btn btn-primary" style="background: white; color: var(--primary); border: none;"
                        onclick="navigateTo('standings')">Ver Tabla</button>
                    <button class="btn btn-outline"
                        style="border: 2px solid white; color: white; background: transparent;"
                        onclick="navigateTo('matches')">Ver Partidos</button>
                </div>
            </div>

            <!-- ALERTS SECTION -->
            <div id="alerts-container" class="alerts-container">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- STANDINGS VIEW -->
        <section id="standings" class="view">
            <h2>Tabla de Posiciones</h2>
            <div id="standings-container">
                <!-- Populated by JS (One table per group) -->
            </div>
        </section>

        <!-- MATCHES VIEW -->
        <section id="matches" class="view">
            <h2>Resultados y Fixture</h2>
            <div id="matches-list" class="matches-grid">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- ADMIN LOGIN VIEW -->
        <section id="admin-login" class="view">
            <div class="login-card">
                <h2>Acceso Administrador</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" id="admin-user" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="admin-pass" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Ingresar</button>
                </form>
            </div>
        </section>

        <!-- ADMIN DASHBOARD VIEW -->
        <section id="admin-dashboard" class="view">
            <div class="admin-header">
                <h2>Panel de Administración</h2>
                <button class="btn btn-outline" style="color: var(--text-main); border-color: var(--border);"
                    onclick="logout()">Cerrar Sesión</button>
            </div>

            <div class="admin-grid">
                <!-- ALERTS MANAGEMENT -->
                <div class="card full-width">
                    <h3>Gestionar Alertas</h3>
                    <form id="add-alert-form">
                        <div class="form-group">
                            <label>Mensaje de Alerta</label>
                            <input type="text" id="alert-message" required
                                placeholder="Ej. Cambio de horario partido X vs Y">
                        </div>
                        <button type="submit" class="btn btn-primary">Publicar</button>
                    </form>
                    <div id="admin-alerts-list" style="margin-top: 15px;">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- GROUP MANAGEMENT -->
                <div class="card">
                    <h3>Crear Grupo</h3>
                    <form id="add-group-form">
                        <div class="form-group">
                            <label>Nombre del Grupo</label>
                            <input type="text" id="group-name" required placeholder="Ej. Grupo A">
                        </div>
                        <button type="submit" class="btn btn-primary">Crear</button>
                    </form>
                    <ul id="admin-groups-list" style="margin-top: 15px; list-style: none;">
                        <!-- Populated by JS -->
                    </ul>
                </div>

                <!-- TEAM MANAGEMENT -->
                <div class="card">
                    <h3>Agregar Equipo</h3>
                    <form id="add-team-form">
                        <div class="form-group">
                            <label>Nombre del Equipo</label>
                            <input type="text" id="team-name" required placeholder="Ej. Los Tigres">
                        </div>
                        <div class="form-group">
                            <label>Grupo</label>
                            <select id="team-group">
                                <option value="">Sin Grupo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>URL del Escudo (Opcional)</label>
                            <input type="url" id="team-logo" placeholder="https://...">
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar Equipo</button>
                    </form>

                    <h4 style="margin-top: 20px; margin-bottom: 10px;">Equipos Existentes</h4>
                    <div id="admin-teams-list" style="max-height: 300px; overflow-y: auto;">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- MATCH MANAGEMENT -->
                <div class="card">
                    <h3>Crear Partido</h3>
                    <form id="add-match-form">
                        <div class="form-group">
                            <label>Local</label>
                            <select id="match-home" required></select>
                        </div>
                        <div class="form-group">
                            <label>Visitante</label>
                            <select id="match-away" required></select>
                        </div>
                        <div class="form-group">
                            <label>Fecha/Hora</label>
                            <input type="datetime-local" id="match-date">
                        </div>
                        <button type="submit" class="btn btn-primary">Crear Partido</button>
                    </form>
                </div>
            </div>

            <div class="card full-width">
                <h3>Gestionar Partidos y Resultados</h3>
                <div id="admin-matches-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>

</html>
